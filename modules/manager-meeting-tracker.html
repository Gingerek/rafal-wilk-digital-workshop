<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rejestr spotkań z managerami | Rafal Wilk</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <style>
    :root {
      --bg: #0b1018;
      --panel: rgba(19, 27, 40, 0.92);
      --panel-soft: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.08);
      --text: #f4f7fb;
      --muted: #aeb9c8;
      --accent: #f28c28;
      --accent-strong: #22c55e;
      --accent-dark: #6a8f3a;
      --ok: #8fe0a5;
      --info: #9fcbff;
      --warn: #ffd58a;
      --danger: #ff9c9c;
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
      --max: 1380px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(214,179,124,.18), transparent 22%),
        radial-gradient(circle at bottom left, rgba(159,203,255,.10), transparent 25%),
        linear-gradient(180deg, #0a0f17, #0d1420 42%, #0b1018 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(var(--max), calc(100% - 28px));
      margin: 18px auto 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.8px solid rgba(240,203,143,.9);
      display: grid;
      place-items: center;
      color: var(--accent-strong);
      background: rgba(214,179,124,.10);
      font-size: 24px;
      font-weight: 800;
      box-shadow: inset 0 0 0 5px rgba(214,179,124,.05);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.02;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .lang-switch {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: var(--shadow);
    }

    .lang-btn,
    .btn,
    .icon-btn,
    select,
    input,
    textarea {
      font: inherit;
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      min-width: 58px;
    }

    .lang-btn.active {
      background: linear-gradient(180deg, var(--accent), #b58c4c);
      color: #231603;
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      transition: .18s ease;
    }

    .btn:hover,
    .icon-btn:hover,
    .lang-btn:hover { transform: translateY(-1px); }

    .btn.primary {
      background: linear-gradient(180deg, var(--accent), #b58c4c);
      color: #231603;
      border-color: transparent;
      box-shadow: var(--shadow);
    }

    .btn.soft {
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero-main {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 140px;
    }

    .hero-main h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.04;
      letter-spacing: -0.02em;
    }

    .hero-main p {
      margin: 10px 0 0;
      font-size: 15px;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.55;
    }

    .hero-stats {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .mini-stat {
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 108px;
    }

    .mini-stat .number {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      line-height: 1;
      margin-top: 8px;
    }

    .mini-stat .label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .layout {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel-inner {
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-head h3 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .section-note {
      margin: 2px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(8, 13, 21, 0.75);
      color: var(--text);
      padding: 13px 14px;
      border-radius: 14px;
      outline: none;
      transition: .18s ease;
    }

    textarea {
      resize: vertical;
      min-height: 92px;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(240,203,143,.7);
      box-shadow: 0 0 0 4px rgba(214,179,124,.12);
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.2fr .7fr auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .meeting-list {
      display: grid;
      gap: 12px;
    }

    .meeting-card {
      border-radius: 22px;
      padding: 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      transition: .18s ease;
    }

    .meeting-card:hover {
      transform: translateY(-1px);
      border-color: rgba(214,179,124,.35);
    }

    .meeting-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .meeting-title {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .meeting-title strong {
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .meeting-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-planned { background: rgba(159,203,255,.15); color: var(--info); }
    .status-done { background: rgba(143,224,165,.16); color: var(--ok); }
    .status-followup { background: rgba(255,213,138,.16); color: var(--warn); }

    .meeting-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .info-box {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 16px;
      padding: 12px;
      min-height: 112px;
    }

    .info-box .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .info-box .v {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .meeting-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .next-date {
      color: var(--muted);
      font-size: 13px;
    }

    .meeting-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .empty {
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1180px) {
      .hero,
      .layout,
      .meeting-grid {
        grid-template-columns: 1fr;
      }
      .hero-stats {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 880px) {
      .field-grid,
      .form-actions,
      .filters,
      .hero-stats {
        grid-template-columns: 1fr;
      }
      .meeting-footer,
      .meeting-top {
        align-items: stretch;
      }
      .meeting-actions {
        width: 100%;
      }
      .icon-btn,
      .btn,
      .lang-btn {
        width: 100%;
      }
      .lang-switch,
      .top-actions {
        width: 100%;
      }
    }


    /* v11: status/action/complete and unique-manager summary removed from manager meeting register */
    .hero-stats .mini-stat:nth-child(n+2){display:none!important;}
    .hero-stats{grid-template-columns:1fr!important;}
    .badge-row{display:none!important;}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="logo">R</div>
        <div>
          <h1 id="appTitle">Rejestr spotkań z managerami</h1>
          <p id="appSubtitle">Wszystkie najważniejsze ustalenia w jednym miejscu</p>
        </div>
      </div>

      <div class="top-actions">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="pl">PL</button>
          <button class="lang-btn" data-lang="nl">NL</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="btn primary" id="exportBtn"></button>
      </div>
    </div>

    <section class="hero">
      <div class="panel hero-main">
        <h2 id="heroTitle"></h2>
        <p id="heroText"></p>
      </div>

      <div class="panel hero-stats">
        <div class="mini-stat">
          <div class="label" id="statAllLabel"></div>
          <div class="number" id="statAll">0</div>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="panel panel-inner">
        <div class="section-head">
          <div>
            <h3 id="formTitle"></h3>
            <div class="section-note" id="formNote"></div>
          </div>
        </div>

        <form id="meetingForm">
          <input type="hidden" id="meetingId" />

          <div class="field-grid">
            <div class="field">
              <label id="labelDate" for="meetingDate"></label>
              <input type="date" id="meetingDate" required />
            </div>
          </div>

          <div class="field">
            <label id="labelManager" for="managerName"></label>
            <input type="text" id="managerName" required />
          </div>

          <div class="field">
            <label id="labelSubject" for="meetingSubject"></label>
            <input type="text" id="meetingSubject" required />
          </div>

          <div class="field">
            <label id="labelDiscussed" for="meetingDiscussed"></label>
            <textarea id="meetingDiscussed" required></textarea>
          </div>

          <div class="field">
            <label id="labelAgreed" for="meetingAgreed"></label>
            <textarea id="meetingAgreed"></textarea>
          </div>

          <div class="field">
            <label id="labelNextSteps" for="meetingNextSteps"></label>
            <textarea id="meetingNextSteps"></textarea>
          </div>

          <div class="field">
            <label id="labelNextMeeting" for="meetingNextDate"></label>
            <input type="date" id="meetingNextDate" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn primary" id="saveBtn"></button>
            <button type="button" class="btn soft" id="clearBtn"></button>
          </div>
        </form>
      </div>

      <div class="panel panel-inner">
        <div class="section-head">
          <div>
            <h3 id="listTitle"></h3>
            <div class="section-note" id="listNote"></div>
          </div>
        </div>

        <div class="filters">
          <input type="text" id="searchInput" />
          <button class="btn soft" id="resetFiltersBtn" type="button"></button>
        </div>

        <div class="meeting-list" id="meetingList"></div>

        <div class="footer">
          <span id="footerText"></span>
          <span>© Rafal Wilk</span>
        </div>
      </div>
    </section>
  </div>

        alert(t('required'));
        return;
      }

      const existingIndex = meetings.findIndex(m => m.id === item.id);

      if (existingIndex >= 0) {
        item.createdAt = meetings[existingIndex].createdAt;
        meetings[existingIndex] = item;
      } else {
        meetings.unshift(item);
      }

      saveData();
      renderAll();

      const saveResult = await saveWorkbookToDisk(false);

      if (saveResult.status === 'cancelled') {

      els.id.value = item.id;
      persistDraft();
      renderAll();
    }

    function parseTrackerDate(value) {
      if (!value) return null;
      const [year, month, day] = String(value).split('-').map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day);
    }

    function toIsoDate(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function startOfIsoWeek(date) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const day = d.getDay() || 7;
      if (day !== 1) d.setDate(d.getDate() - day + 1);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function getIsoWeekInfo(date) {
      const temp = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = temp.getUTCDay() || 7;
      temp.setUTCDate(temp.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(temp.getUTCFullYear(), 0, 1));
      const week = Math.ceil((((temp - yearStart) / 86400000) + 1) / 7);
      return {
        year: temp.getUTCFullYear(),
        week,
        monday: startOfIsoWeek(date)
      };
    }

    function formatWeekLabel(info) {
      return `${t('reportWeekLabelPrefix')} ${info.week} · ${info.year}`;
    }

    function formatMonthLabel(date) {
      return new Intl.DateTimeFormat(currentLang, { month: 'short', year: 'numeric' }).format(date);
    }

    function addPeriodCount(map, key, factory, status) {
      if (!map.has(key)) map.set(key, factory());
      const bucket = map.get(key);
      bucket.count += 1;
      bucket.completed = bucket.completed || 0;
      bucket.planned = bucket.planned || 0;
      bucket.followup = bucket.followup || 0;
      bucket.open = bucket.open || 0;
      if (status === 'done') bucket.completed += 1;
      else if (status === 'followup') bucket.followup += 1;
      else {
        bucket.planned += 1;
        bucket.open += 1;
      }
    }

    function buildMeetingSummaries(sourceMeetings) {
      const weeklyMap = new Map();
      const monthlyMap = new Map();
      const quarterlyMap = new Map();
      const yearlyMap = new Map();
      const statusMap = new Map();
      const totals = { all: 0, completed: 0, planned: 0, followup: 0, open: 0 };

      (sourceMeetings || []).forEach(item => {
        const date = parseTrackerDate(item.date);
        if (!date) return;
        const status = statusOptions.includes(item.status) ? item.status : 'planned';
        totals.all += 1;
        if (status === 'done') totals.completed += 1;
        else if (status === 'followup') { totals.followup += 1; totals.open += 1; }
        else { totals.planned += 1; totals.open += 1; }

        statusMap.set(status, (statusMap.get(status) || 0) + 1);

        const weekInfo = getIsoWeekInfo(date);
        addPeriodCount(weeklyMap, `${weekInfo.year}-W${pad2(weekInfo.week)}`, () => ({
          label: formatWeekLabel(weekInfo),
          periodStart: toIsoDate(weekInfo.monday),
          count: 0
        }), status);

        const monthKey = `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`;
        addPeriodCount(monthlyMap, monthKey, () => ({
          label: formatMonthLabel(date),
          periodStart: `${monthKey}-01`,
          count: 0
        }), status);

        const quarter = Math.floor(date.getMonth() / 3) + 1;
        addPeriodCount(quarterlyMap, `${date.getFullYear()}-Q${quarter}`, () => ({
          label: `Q${quarter} ${date.getFullYear()}`,
          periodStart: `${date.getFullYear()}-${pad2((quarter - 1) * 3 + 1)}-01`,
          count: 0
        }), status);

        addPeriodCount(yearlyMap, String(date.getFullYear()), () => ({
          label: String(date.getFullYear()),
          periodStart: `${date.getFullYear()}-01-01`,
          count: 0
        }), status);
      });

      const byPeriod = map => Array.from(map.values()).sort((a, b) => String(a.periodStart || '').localeCompare(String(b.periodStart || '')));
      return {
        totals,
        weekly: byPeriod(weeklyMap),
        monthly: byPeriod(monthlyMap),
        quarterly: byPeriod(quarterlyMap),
        yearly: byPeriod(yearlyMap),
        statuses: Array.from(statusMap, ([status, count]) => ({ status, count }))
      };
    }


    function loadExternalScript(srcUrl) {
      return new Promise((resolve, reject) => {
        const existing = Array.from(document.scripts).find(script => script.src === srcUrl);
        if (existing) {
          if (existing.dataset.loaded === 'true') resolve();
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error('Script failed: ' + srcUrl)), { once: true });
          return;
        }
        const script = document.createElement('script');
        script.src = srcUrl;
        script.async = true;
        script.dataset.dynamicLoader = 'true';
        script.onload = () => { script.dataset.loaded = 'true'; resolve(); };
        script.onerror = () => reject(new Error('Script failed: ' + srcUrl));
        document.head.appendChild(script);
      });
    }

      for (const srcUrl of sources) {

        }
      }

        function xmlEscape(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    function xmlSheetName(value) {
      return xmlEscape(String(value || 'Sheet').replace(/[\\/*?:\[\]]/g, ' ').slice(0, 31));
    }

    function xmlCell(value, style = 'Text', mergeAcross = 0, type = null) {
      const numeric = typeof value === 'number' && Number.isFinite(value);
      const cellType = type || (numeric ? 'Number' : 'String');
      const merge = mergeAcross ? ` ss:MergeAcross="${mergeAcross}"` : '';
      return `<Cell ss:StyleID="${style}"${merge}><Data ss:Type="${cellType}">${xmlEscape(value)}</Data></Cell>`;
    }

    function xmlEmptyCell(style = 'Text') {
      return `<Cell ss:StyleID="${style}"/>`;
    }

    function xmlRow(cells, height = null) {
      const h = height ? ` ss:AutoFitHeight="0" ss:Height="${height}"` : '';
      return `<Row${h}>${cells.join('')}</Row>`;
    }

    function xmlWorksheet(name, rows, columns = []) {
      const colXml = columns.map(width => `<Column ss:Width="${width}"/>`).join('');
      return `<Worksheet ss:Name="${xmlSheetName(name)}"><Table>${colXml}${rows.join('')}</Table><WorksheetOptions xmlns="urn:schemas-microsoft-com:office:excel"><FreezePanes/><FrozenNoSplit/><SplitHorizontal>4</SplitHorizontal><TopRowBottomPane>4</TopRowBottomPane><ActivePane>2</ActivePane><Panes><Pane><Number>3</Number></Pane><Pane><Number>2</Number></Pane></Panes><ProtectObjects>False</ProtectObjects><ProtectScenarios>False</ProtectScenarios></WorksheetOptions></Worksheet>`;
    }

    function chartBlock(title, items, colorStyle = 'ChartGreen') {
      const cleanItems = (items || []).slice(-12).filter(item => item && item.label);
      const rows = [];
      rows.push(xmlRow([xmlCell(title, 'Section', Math.max(4, cleanItems.length * 3 - 1))], 24));
      if (!cleanItems.length) {
        rows.push(xmlRow([xmlCell('-', 'Text')], 20));
        return rows;
      }
      const max = Math.max(1, ...cleanItems.flatMap(item => [Number(item.count) || 0, Number(item.completed) || 0, Number(item.followup) || 0]));
      const chartHeight = 10;
      const labelCells = [xmlEmptyCell('Text')];
      cleanItems.forEach(item => {
        labelCells.push(xmlCell(item.label, 'ChartLabel', 2));
      });
      rows.push(xmlRow(labelCells, 24));
      for (let level = chartHeight; level >= 1; level -= 1) {
        const valueLabel = Math.ceil((max / chartHeight) * level);
        const cells = [xmlCell(valueLabel, 'Axis')];
        cleanItems.forEach(item => {
          const totalH = Math.round(((Number(item.count) || 0) / max) * chartHeight);
          const doneH = Math.round(((Number(item.completed) || 0) / max) * chartHeight);
          const followH = Math.round(((Number(item.followup) || 0) / max) * chartHeight);
          cells.push(level <= totalH ? xmlCell('', colorStyle) : xmlEmptyCell('ChartBlank'));
          cells.push(level <= doneH ? xmlCell('', 'ChartBlue') : xmlEmptyCell('ChartBlank'));
          cells.push(level <= followH ? xmlCell('', 'ChartRed') : xmlEmptyCell('ChartBlank'));
        });
        rows.push(xmlRow(cells, 16));
      }
      const legend = [xmlCell('', 'Text'), xmlCell('', colorStyle), xmlCell(t('reportTotalMeetings'), 'Legend')];
      rows.push(xmlRow(legend, 20));
      rows.push(xmlRow([xmlCell('', 'Text')], 12));
      return rows;

    function makePeriodRows(sourceMeetings, mode) {
      const map = new Map();
      sourceMeetings.forEach(item => {
        const date = parseTrackerDate(item.date);
        if (!date) return;
        let key = '', label = '', start = '';
        if (mode === 'week') {
          const info = getIsoWeekInfo(date);
          key = `${info.year}-W${pad2(info.week)}`;
          label = formatWeekLabel(info);
          start = toIsoDate(info.monday);
        } else if (mode === 'month') {
          key = `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`;
          label = formatMonthLabel(date);
          start = `${key}-01`;
        } else if (mode === 'quarter') {
          const q = Math.floor(date.getMonth() / 3) + 1;
          key = `${date.getFullYear()}-Q${q}`;
          label = `Q${q} ${date.getFullYear()}`;
          start = `${date.getFullYear()}-${pad2((q - 1) * 3 + 1)}-01`;
        } else {
          key = String(date.getFullYear());
          label = key;
          start = `${key}-01-01`;
        }
        if (!map.has(key)) map.set(key, { label, count: 0, start });
        map.get(key).count += 1;
      });
      return Array.from(map.values()).sort((a, b) => String(a.start).localeCompare(String(b.start)));
    }

      const meetingRows = getCleanMeetingRows(sourceMeetings); const headers = meetingRows.length ? Object.keys(meetingRows[0]) : ['#', t('labelDate'), t('labelManager'), t('labelSubject'), t('labelDiscussed'), t('labelAgreed'), t('labelNextSteps'), t('labelNextMeeting')]; const ws = workbook.addWorksheet(t('exportSheet') || 'Meetings', { views: [{ state: 'frozen', ySplit: 4 }] }); ws.columns = [{ width: 6 }, { width: 15 }, { width: 24 }, { width: 30 }, { width: 54 }, { width: 42 }, { width: 42 }, { width: 18 }]; ws.mergeCells('A1:H1'); applyTitleCell(ws.getCell('A1'), colors.olive); ws.getCell('A1').value = t('exportSheet') || 'Meetings'; ws.getCell('A2').value = t('reportGenerated') || 'Generated'; ws.getCell('B2').value = generatedAt; const hr = ws.getRow(4); headers.forEach((h, idx) => { const cell = hr.getCell(idx + 1); cell.value = h; applyHeaderCell(cell, colors.orange); }); meetingRows.forEach((obj, rIdx) => { const er = ws.getRow(5 + rIdx); er.height = 60; headers.forEach((h, cIdx) => { const cell = er.getCell(cIdx + 1); cell.value = obj[h] == null ? '' : obj[h]; applyBodyCell(cell, rIdx % 2 === 1); if (cIdx === 0 || cIdx === 1) cell.alignment = { horizontal: 'center', vertical: 'top', wrapText: true }; }); }); ws.autoFilter = { from: 'A4', to: 'H4' }; return workbook;
    }
    function saveBufferAsFile(buffer, fileName) { const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileName; document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000); }
    async function exportExcel(forceChooseLocation = false) {
      try { const sourceMeetings = allMeetingsSorted(); if (!sourceMeetings.length) { alert(t('emptyState') || 'No meetings to export.'); return; } const workbook = await createCleanCorporateWorkbook(sourceMeetings); const buffer = await workbook.xlsx.writeBuffer(); const fileName = `${t('exportFile')}_EXCEL_${new Date().toISOString().slice(0, 10)}.xlsx`; saveBufferAsFile(buffer, fileName); }
      catch (error) { console.error('ExcelJS export failed. Trying simple SheetJS fallback.', error); try { await ensureXlsxReady(); const sourceMeetings = allMeetingsSorted(); const rows = getCleanMeetingRows(sourceMeetings); const wb = XLSX.utils.book_new(); const generatedAt = new Intl.DateTimeFormat(currentLang, { dateStyle: 'medium', timeStyle: 'short' }).format(new Date()); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([[t('reportTitle') || 'Report'], [t('reportGenerated') || 'Generated', generatedAt], [], [t('reportTotalMeetings') || 'Total meetings', sourceMeetings.length]]), safeSheetName(t('reportDashboardSheet') || 'Dashboard')); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), safeSheetName(t('exportSheet') || 'Meetings')); XLSX.writeFile(wb, `${t('exportFile')}_EXCEL_${new Date().toISOString().slice(0, 10)}.xlsx`, { bookType: 'xlsx', compression: false }); } catch (fallbackError) { console.error('Excel export failed.', fallbackError); alert(currentLang === 'pl' ? 'Nie udało się wygenerować pliku Excel.' : currentLang === 'nl' ? 'Het Excel-bestand kon niet worden gemaakt.' : 'The Excel file could not be created.'); } }
    }

    async function saveWorkbookToDisk(forceChooseLocation = false, workbook = null) {
      try {
        await ensureXlsxReady();
        const wb = workbook || createStableXlsxWorkbook();
        if (!wb) return { status: 'empty' };
        if (!window.showSaveFilePicker) return { status: 'local-only' };
        const handle = await ensureWritableFileHandle(forceChooseLocation);
        if (!handle) return { status: 'cancelled' };
        const output = XLSX.write(wb, { bookType: 'xlsx', type: 'array', compression: true });
        const blob = new Blob([output], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        return { status: 'saved' };
      } catch (error) {
        console.error(error);
        return { status: error && error.name === 'AbortError' ? 'cancelled' : 'error' };
      }
    }

    async function ensureWritableFileHandle(forceChooseLocation = false) {
      if (!window.showSaveFilePicker) return null;

      if (!forceChooseLocation && !excelFileHandle) {
        excelFileHandle = await loadStoredFileHandle();
      }

      if (!forceChooseLocation && excelFileHandle) {
        const hasPermission = await verifyPermission(excelFileHandle, true);
        if (hasPermission) return excelFileHandle;
      }

      const suggestedName = `${t('exportFile')}.xlsx`;
      const pickedHandle = await window.showSaveFilePicker({
        suggestedName,
        types: [{
          description: t('chooseLocation'),
          accept: {
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx']
          }
        }]
      });

      const granted = await verifyPermission(pickedHandle, true);
      if (!granted) return null;

      excelFileHandle = pickedHandle;
      await saveFileHandleToDb(pickedHandle);
      return excelFileHandle;
    }

    async function verifyPermission(handle, readWrite = false) {
      if (!handle) return false;
      const options = readWrite ? { mode: 'readwrite' } : {};
      if ((await handle.queryPermission(options)) === 'granted') return true;
      if ((await handle.requestPermission(options)) === 'granted') return true;
      return false;
    }

    function openHandleDb() {
      return new Promise((resolve, reject) => {
        if (!window.indexedDB) {
          resolve(null);
          return;
        }

        const request = indexedDB.open(FILE_DB_NAME, 1);

        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(FILE_DB_STORE)) {
            db.createObjectStore(FILE_DB_STORE);
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveFileHandleToDb(handle) {
      try {
        const db = await openHandleDb();
        if (!db) return;
        await new Promise((resolve, reject) => {
          const tx = db.transaction(FILE_DB_STORE, 'readwrite');
          tx.objectStore(FILE_DB_STORE).put(handle, FILE_DB_KEY);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
        db.close();
      } catch (error) {
        console.error(error);
      }
    }

    async function loadStoredFileHandle() {
      try {
        const db = await openHandleDb();
        if (!db) return null;
        const handle = await new Promise((resolve, reject) => {
          const tx = db.transaction(FILE_DB_STORE, 'readonly');
          const request = tx.objectStore(FILE_DB_STORE).get(FILE_DB_KEY);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
        db.close();
        return handle;
      } catch (error) {
        console.error(error);
        return null;
      }
    }
